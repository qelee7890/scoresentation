<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>46장. 찬양하라 복되신 구세주 예수 - 악보 프레젠테이션</title>
    <link rel="stylesheet" href="presentation.css">
    <link rel="stylesheet" href="notes.css">
</head>
<body>
    <form id="hymn-picker" class="hymn-picker" autocomplete="off">
        <label for="hymn-number">곡 번호</label>
        <input id="hymn-number" name="hymn" type="text" inputmode="numeric" pattern="[0-9]*" placeholder="46">
        <button type="submit">열기</button>
        <div id="hymn-picker-title" class="hymn-picker-title"></div>
    </form>

    <div id="app-status" class="app-status" hidden></div>
    <div id="presentation" class="presentation"></div>

    <script src="demo-hymn-data.js"></script>
    <script src="storage.js"></script>
    <script src="notes.js"></script>
    <script src="presentation.js"></script>
    <script src="app.js"></script>
</body>
</html>
